{% extends "base.html" %}

{% block title %}Delete Event: {{ event.title }}{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-2xl border border-gray-100">
    <h1 class="text-3xl font-bold text-red-700 mb-6 text-center">Delete Event</h1>

    <div class="p-6 bg-red-50 border border-red-300 rounded-lg mb-6">
        <p class="text-lg text-red-800 font-semibold mb-3">
            Are you absolutely sure you want to delete the event:
        </p>
        <p class="text-xl font-extrabold text-gray-900">{{ event.title }}?</p>
        <p class="text-sm text-gray-600 mt-2">This action cannot be undone.</p>
    </div>

    <form method="post">
        {% csrf_token %}
        <div class="flex justify-between space-x-4">
            <a href="{% url 'event_detail' event.pk %}" 
               class="flex-1 py-3 px-4 text-center bg-gray-300 text-gray-800 font-semibold rounded-lg shadow-md hover:bg-gray-400 transition duration-150">
                Cancel
            </a>
            <button type="submit" 
                    class="flex-1 py-3 px-4 bg-red-600 text-white font-semibold rounded-lg shadow-md hover:bg-red-700 transition duration-150">
                Confirm Delete
            </button>
        </div>
    </form>
</div>
{% endblock %}
